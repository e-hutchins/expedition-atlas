<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Amtrak Empire Builder - Expedition Atlas</title>
  <link rel="stylesheet" href="../../shared/css/base.css" />
  <link rel="stylesheet" href="css/style.css" />
  <!-- Leaflet, via CDN per the no-build-step tech stack -->
  <link
    rel="stylesheet"
    href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css"
    integrity="sha256-p4NxAoJBhIIN+hmNHrzRCf9tD/miZyoHS5obTRR9BMY="
    crossorigin=""
  />
</head>
<body>
  <header class="container">
    <p><a href="../../index.html">&larr; Expedition Atlas</a></p>
    <h1>Amtrak Empire Builder</h1>
  </header>

  <!-- Map mounts here. Left empty intentionally -- Leaflet
       initialization, layers, and controls are added in a later pass. -->
  <div id="map"></div>

  <!-- Elevation profile chart. Hidden by js/elevation-profile.js if no
       elevation data has been generated yet (see scripts/prep_elevation.py). -->
  <div id="elevation-profile-container" class="container">
    <h2>Elevation profile</h2>
    <canvas id="elevation-profile-chart"></canvas>
  </div>

  <script
    src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"
    integrity="sha256-20nQCchB9co0qIjJZRGuk2/Z9VM+kNiyxNV1lvTlZBo="
    crossorigin=""
  ></script>
  <!-- Chart.js, via CDN per the no-build-step tech stack. No integrity
       hash here -- unlike the Leaflet tags above, this one wasn't
       computed against the actual fetched file (network-restricted
       sandbox), so add one yourself if you want SRI on this tag too. -->
  <script src="https://unpkg.com/chart.js@4.4.4/dist/chart.umd.js"></script>
  <script src="../../shared/js/geojson-layer.js"></script>
  <script src="js/main.js"></script>
  <script src="js/elevation-profile.js"></script>
</body>
</html>
